name: Build FewMB

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install WebView2 SDK
        shell: pwsh
        run: |
          # WebView2 paketini nuget üzerinden indiriyoruz
          nuget install Microsoft.Web.WebView2 -OutputDirectory packages

      - name: Configure CMake
        shell: pwsh
        run: |
          # Projenin nerede olduğunu (alt klasör ihtimaline karşı) otomatik bulalım
          $cmakeFile = Get-ChildItem -Recurse -Filter "CMakeLists.txt" | Select-Object -First 1
          if (-not $cmakeFile) { throw "CMakeLists.txt bulunamadı!" }
          $sourceDir = $cmakeFile.Directory.FullName
          
          # İndirdiğimiz WebView2 klasörünü bulalım
          $wv2_dir = Get-ChildItem -Directory -Path "packages/Microsoft.Web.WebView2.*" | Select-Object -First 1
          $wv2_path = $wv2_dir.FullName
          
          # CMake'e hem kaynak dizini hem de WebView2 yollarını veriyoruz
          cmake -S "$sourceDir" -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -A x64 `
            "-DWebView2_INCLUDE_DIR=$wv2_path/build/native/include" `
            "-DWebView2_LIBRARIES=$wv2_path/build/native/x64/WebView2Loader.dll.lib"

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Prepare Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist"
          
          # EXE dosyasını kopyala (CMakeLists'te bin klasörüne çıkacak şekilde ayarlı)
          Copy-Item "build/bin/Release/FewMB.exe" -Destination "dist/"
          
          # WebView2Loader.dll dosyasını bul ve yanına koy (Çalışması için şart)
          $dll = Get-ChildItem -Path "packages" -Recurse -Filter "WebView2Loader.dll" | Where-Object { $_.FullName -like "*x64*" } | Select-Object -First 1
          Copy-Item $dll.FullName -Destination "dist/"
          
          Compress-Archive -Path "dist/*" -DestinationPath "FewMB-Windows-x64.zip" -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FewMB-Windows-x64
          path: FewMB-Windows-x64.zip

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download
        uses: actions/download-artifact@v4
        with:
          name: FewMB-Windows-x64
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: FewMB-Windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
