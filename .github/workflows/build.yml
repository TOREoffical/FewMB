name: Build FewMB

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PROJECT_NAME: FewMB

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install WebView2 SDK
        shell: pwsh
        run: |
          # WebView2 paketini indiriyoruz çünkü standart imajda eksik olabilir
          nuget install Microsoft.Web.WebView2 -OutputDirectory packages

      - name: Configure CMake
        shell: pwsh
        run: |
          # NuGet paketinin yolunu CMake'e tanıtıyoruz
          $wv2_dir = Get-ChildItem -Directory -Path "packages/Microsoft.Web.WebView2.*" | Select-Object -First 1
          $wv2_path = $wv2_dir.FullName
          
          cmake -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -A x64 `
            "-DWebView2_INCLUDE_DIR=$wv2_path/build/native/include" `
            "-DWebView2_LIBRARIES=$wv2_path/build/native/x64/WebView2Loader.dll.lib"

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Prepare Artifacts
        shell: pwsh
        run: |
          # Çıktı klasörünü oluştur
          New-Item -ItemType Directory -Force -Path "dist"
          
          # Çalıştırılabilir dosyayı kopyala
          Copy-Item "build/bin/Release/FewMB.exe" -Destination "dist/" -ErrorAction Continue
          
          # Gerekli WebView2 DLL'ini bul ve yanına koy
          $wv2_dll = Get-ChildItem -Path "packages/Microsoft.Web.WebView2.*" -Recurse -Filter "WebView2Loader.dll" | Where-Object { $_.FullName -like "*x64*" } | Select-Object -First 1
          if ($wv2_dll) {
            Copy-Item $wv2_dll.FullName -Destination "dist/"
          }
          
          # Paketi sıkıştır
          Compress-Archive -Path "dist/*" -DestinationPath "FewMB-Windows-x64.zip" -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FewMB-Windows-x64
          path: FewMB-Windows-x64.zip

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: FewMB-Windows-x64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: FewMB-Windows-x64.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
