name: Build FewMB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Project Files
        shell: pwsh
        run: |
          $zipFile = Get-ChildItem -Filter "*.zip" | Select-Object -First 1
          if ($zipFile) {
            Expand-Archive -Path $zipFile.FullName -DestinationPath "project_source" -Force
          }

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install WebView2 SDK
        shell: pwsh
        run: nuget install Microsoft.Web.WebView2 -OutputDirectory packages

      - name: Configure and Patch CMake
        shell: pwsh
        run: |
          $cmakeFile = Get-ChildItem -Recurse -Filter "CMakeLists.txt" | Select-Object -First 1
          $sourceDir = $cmakeFile.Directory.FullName
          
          # Hatalı olan -Wextra bayrağını MSVC uyumlu hale getirmek için dosyayı geçici olarak düzenliyoruz
          (Get-Content $cmakeFile.FullName) -replace '-Wextra', '/W4' | Set-Content $cmakeFile.FullName
          
          $wv2_dir = Get-ChildItem -Directory -Path "packages/Microsoft.Web.WebView2.*" | Select-Object -First 1
          $wv2_path = $wv2_dir.FullName
          
          # WebView2_FOUND değerini zorunlu kılıp yolları netleştiriyoruz
          cmake -S "$sourceDir" -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -A x64 `
            "-DWebView2_FOUND=TRUE" `
            "-DWebView2_INCLUDE_DIR=$wv2_path/build/native/include" `
            "-DWebView2_LIBRARIES=$wv2_path/build/native/x64/WebView2Loader.dll.lib"

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Prepare Artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist"
          
          # Binary dosyasını kontrol et ve kopyala
          if (Test-Path "build/bin/Release/FewMB.exe") {
            Copy-Item "build/bin/Release/FewMB.exe" -Destination "dist/"
          } elseif (Test-Path "build/Release/FewMB.exe") {
            Copy-Item "build/Release/FewMB.exe" -Destination "dist/"
          }
          
          $dll = Get-ChildItem -Path "packages" -Recurse -Filter "WebView2Loader.dll" | Where-Object { $_.FullName -like "*x64*" } | Select-Object -First 1
          if ($dll) { Copy-Item $dll.FullName -Destination "dist/" }
          
          if (Test-Path "dist/FewMB.exe") {
            Compress-Archive -Path "dist/*" -DestinationPath "FewMB-Windows-x64.zip" -Force
          } else {
            Write-Error "Build basarili oldu ama EXE bulunamadi!"
            exit 1
          }

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: FewMB-Windows-Binary
          path: FewMB-Windows-x64.zip
