name: Build FewMB

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PROJECT_NAME: FewMB

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1 # Daha güncel ve stabil bir alternatif
        with:
          arch: x64

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -A x64

      - name: Build
        shell: pwsh
        run: |
          # Windows'ta paralel build için NUMBER_OF_PROCESSORS kullanılır
          cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Copy Runtime DLLs
        shell: pwsh
        run: |
          # Dizin yoksa oluştur (hata almamak için)
          New-Item -ItemType Directory -Force -Path build/bin/Release
          $wv2Path = "C:\Program Files (x86)\Microsoft\EdgeWebView\Application"
          if (Test-Path $wv2Path) {
             # En güncel klasörü bulup içinden DLL'i alıyoruz
             $dll = Get-ChildItem -Path $wv2Path -Recurse -Filter "WebView2Loader.dll" | Select-Object -First 1
             if ($dll) { Copy-Item $dll.FullName "build/bin/Release/" }
          }

      - name: Package
        shell: pwsh
        run: |
          # Klasörün varlığından emin olalım
          if (Test-Path "build/bin/Release") {
            Compress-Archive -Path "build/bin/Release/*" -DestinationPath "FewMB-Windows-x64.zip" -Force
          } else {
            Write-Error "Build output directory not found!"
            exit 1
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FewMB-Windows-x64
          path: FewMB-Windows-x64.zip

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: FewMB-Windows-x64

      - name: Create Release
        uses: softprops/action-gh-release@v2 # v2'ye güncellendi
        with:
          files: FewMB-Windows-x64.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
