name: Build FewMB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Project Files
        shell: pwsh
        run: |
          $zipFile = Get-ChildItem -Filter "*.zip" | Select-Object -First 1
          if ($zipFile) { Expand-Archive -Path $zipFile.FullName -DestinationPath "project_source" -Force }

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install WebView2 SDK
        shell: pwsh
        run: nuget install Microsoft.Web.WebView2 -OutputDirectory packages

      - name: Patch and Configure CMake
        shell: pwsh
        run: |
          $cmakeFile = Get-ChildItem -Recurse -Filter "CMakeLists.txt" | Select-Object -First 1
          $sourceDir = $cmakeFile.Directory.FullName
          
          # MSVC uyumsuz bayrakları temizle (GCC -> MSVC dönüşümü)
          $content = Get-Content $cmakeFile.FullName
          $content = $content -replace '-Wextra', '/W4'
          $content = $content -replace '-Wall', '/W3'
          $content = $content -replace '-O3', '/O2'
          $content | Set-Content $cmakeFile.FullName
          
          # WebView2 yollarını kesinleştir
          $wv2_dir = Get-ChildItem -Directory -Path "packages/Microsoft.Web.WebView2.*" | Select-Object -First 1
          $inc_path = Join-Path $wv2_dir.FullName "build/native/include"
          $lib_path = Join-Path $wv2_dir.FullName "build/native/x64/WebView2Loader.dll.lib"
          
          # CMake konfigürasyonu
          cmake -S "$sourceDir" -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -A x64 `
            "-DWebView2_INCLUDE_DIR=$inc_path" `
            "-DWebView2_LIBRARIES=$lib_path" `
            "-DCMAKE_PREFIX_PATH=$wv2_dir.FullName"

      - name: Build
        shell: pwsh
        run: |
          # Include dizinini ortam değişkeni olarak ekleyerek C1083 hatasını önlüyoruz
          $wv2_dir = Get-ChildItem -Directory -Path "packages/Microsoft.Web.WebView2.*" | Select-Object -First 1
          $env:INCLUDE += ";$(Join-Path $wv2_dir.FullName 'build/native/include')"
          cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Prepare Artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist"
          # Çıktı yollarını kontrol et
          $exePath = Get-ChildItem -Path "build" -Recurse -Filter "FewMB.exe" | Where-Object { $_.FullName -like "*Release*" } | Select-Object -First 1
          if ($exePath) { Copy-Item $exePath.FullName -Destination "dist/" }
          
          $dll = Get-ChildItem -Path "packages" -Recurse -Filter "WebView2Loader.dll" | Where-Object { $_.FullName -like "*x64*" } | Select-Object -First 1
          if ($dll) { Copy-Item $dll.FullName -Destination "dist/" }
          
          if (Test-Path "dist/FewMB.exe") {
            Compress-Archive -Path "dist/*" -DestinationPath "FewMB-Windows-x64.zip" -Force
          } else {
            throw "Build bitti ama EXE dosyasi hiçbir yerde bulunamadi!"
          }

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: FewMB-Windows-Binary
          path: FewMB-Windows-x64.zip
